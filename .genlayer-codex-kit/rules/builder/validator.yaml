version: 3.0.0
group: builder
rules:
  - id: GL-VAL-001
    title: Validator checks shape only
    severity: high
    default_result: BLOCK
    evidence_required: true
  - id: GL-VAL-002
    title: Validator repeats leader without independent verification
    severity: high
    default_result: BLOCK
    evidence_required: true
  - id: GL-VAL-003
    title: Equivalence strategy mismatches output
    severity: high
    default_result: BLOCK
    evidence_required: true
  - id: GL-VAL-004
    title: Strict equality on variable output
    severity: medium
    default_result: WARN
    evidence_required: true
  - id: GL-VAL-005
    title: Ambiguity untested
    severity: medium
    default_result: WARN
    evidence_required: true
  - id: GL-VAL-006
    title: Malformed output unhandled
    severity: medium
    default_result: WARN
    evidence_required: true
  - id: GL-VAL-007
    title: Unavailable source unhandled
    severity: medium
    default_result: WARN
    evidence_required: true
  - id: GL-VAL-008
    title: Validation criteria under-specified
    severity: high
    default_result: BLOCK
    evidence_required: true
