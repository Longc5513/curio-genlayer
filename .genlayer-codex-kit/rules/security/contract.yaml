version: 3.0.0
group: security
rules:
  - id: GL-SEC-030
    title: Missing caller authorization
    severity: high
    default_result: BLOCK
    evidence_required: true
  - id: GL-SEC-031
    title: Replay or duplicate claim
    severity: high
    default_result: BLOCK
    evidence_required: true
  - id: GL-SEC-032
    title: Unsafe withdraw/resolve
    severity: high
    default_result: BLOCK
    evidence_required: true
  - id: GL-SEC-033
    title: State changes before validation
    severity: high
    default_result: BLOCK
    evidence_required: true
  - id: GL-SEC-034
    title: Unbounded model/web cost
    severity: medium
    default_result: WARN
    evidence_required: true
  - id: GL-SEC-035
    title: Silent fallback changes adjudication
    severity: blocker
    default_result: BLOCK
    evidence_required: true
