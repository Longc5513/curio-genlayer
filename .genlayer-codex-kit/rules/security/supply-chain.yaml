version: 3.0.0
group: security
rules:
  - id: GL-SEC-040
    title: Secret committed
    severity: blocker
    default_result: BLOCK
    evidence_required: true
  - id: GL-SEC-041
    title: Unreviewed install script
    severity: high
    default_result: BLOCK
    evidence_required: true
  - id: GL-SEC-042
    title: Mutable critical dependency
    severity: medium
    default_result: WARN
    evidence_required: true
  - id: GL-SEC-043
    title: Required notice removed
    severity: high
    default_result: BLOCK
    evidence_required: true
  - id: GL-SEC-044
    title: Opaque binary trusted
    severity: high
    default_result: BLOCK
    evidence_required: true
