version: 3.0.0
group: security
rules:
  - id: GL-SEC-010
    title: SSRF to local/private network
    severity: blocker
    default_result: BLOCK
    evidence_required: true
  - id: GL-SEC-011
    title: Cloud metadata access
    severity: blocker
    default_result: BLOCK
    evidence_required: true
  - id: GL-SEC-012
    title: Unsafe redirects
    severity: high
    default_result: BLOCK
    evidence_required: true
  - id: GL-SEC-013
    title: Unsupported URL scheme
    severity: high
    default_result: BLOCK
    evidence_required: true
  - id: GL-SEC-014
    title: No response size limit
    severity: medium
    default_result: WARN
    evidence_required: true
  - id: GL-SEC-015
    title: No timeout/retry bound
    severity: medium
    default_result: WARN
    evidence_required: true
  - id: GL-SEC-016
    title: DNS rebinding unhandled
    severity: high
    default_result: BLOCK
    evidence_required: true
